name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # If knowme lives in a subfolder of the repo, set this to that folder name.
  # If go.mod is at the repo root, use "."
  SITE_DIR: .

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify project layout
        working-directory: ${{ env.SITE_DIR }}
        run: |
          echo "Repo root contents:"
          ls -la
          if [ ! -f go.mod ]; then
            echo "::error::go.mod is missing from the repo root. Push the full knowme project (go.mod, cmd/, internal/, web/)."
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ env.SITE_DIR }}/go.mod

      - name: Build static site
        working-directory: ${{ env.SITE_DIR }}
        run: go run ./cmd/staticexport

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.SITE_DIR }}/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
